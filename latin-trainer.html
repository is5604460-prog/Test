<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Латинский язык — Сессия 2026</title>
<style>
  :root {
    --bg: #0d0f18;
    --surface: #141726;
    --card: #1c1f33;
    --card2: #20243a;
    --border: #272b45;
    --accent: #7c6ef5;
    --accent-glow: rgba(124,110,245,0.25);
    --accent2: #b8a4ff;
    --correct: #34d399;
    --correct-bg: rgba(52,211,153,0.1);
    --wrong: #f87171;
    --wrong-bg: rgba(248,113,113,0.1);
    --text: #e8eaf6;
    --muted: #7880a0;
    --warning: #fbbf24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(160deg, #1a1740 0%, #141726 100%);
    padding: 22px 20px 18px;
    text-align: center;
    position: relative;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
  }
  .header-icon { font-size: 1.6rem; margin-bottom: 4px; }
  header h1 { font-size: 1.25rem; font-weight: 800; color: var(--accent2); letter-spacing: -0.3px; }
  header p { font-size: 0.78rem; color: var(--muted); margin-top: 3px; letter-spacing: 0.3px; }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    background: var(--surface);
    padding: 0 16px;
    gap: 4px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    flex: 1;
    padding: 13px 4px 11px;
    text-align: center;
    font-size: 0.83rem;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    border: none;
    background: none;
    transition: color 0.2s;
    position: relative;
    letter-spacing: 0.1px;
  }
  .tab.active { color: var(--accent2); }
  .tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 12%; right: 12%;
    height: 2.5px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px 2px 0 0;
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    align-items: center;
  }
  .controls select {
    flex: 1;
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 9px 12px;
    font-size: 0.82rem;
    appearance: none;
    -webkit-appearance: none;
    outline: none;
  }
  .btn {
    padding: 9px 18px;
    border-radius: 50px;
    border: none;
    font-size: 0.82rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s;
    white-space: nowrap;
    letter-spacing: 0.2px;
  }
  .btn:active { transform: scale(0.95); }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #9d8fff);
    color: #fff;
    box-shadow: 0 4px 16px var(--accent-glow);
  }
  .btn-outline {
    background: var(--card2);
    color: var(--accent2);
    border: 1.5px solid var(--border);
  }

  /* ── Progress ── */
  .progress-bar { height: 3px; background: var(--border); }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.4s cubic-bezier(.4,0,.2,1);
  }

  /* ── Stats row ── */
  .stats-row {
    display: flex;
    gap: 16px;
    padding: 9px 18px;
    font-size: 0.78rem;
    color: var(--muted);
    background: var(--surface);
    align-items: center;
  }
  .stats-row span b { color: var(--text); font-weight: 700; }
  .stat-correct b { color: var(--correct); }
  .stat-wrong b { color: var(--wrong); }
  .stats-spacer { flex: 1; }

  /* ── Quiz area ── */
  .quiz-area { padding: 16px; max-width: 640px; margin: 0 auto; }

  /* ── Question card ── */
  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 22px 20px;
    margin-bottom: 14px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.3);
  }
  .question-num {
    font-size: 0.7rem;
    color: var(--accent2);
    margin-bottom: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    opacity: 0.7;
  }
  .question-text { font-size: 1rem; line-height: 1.6; font-weight: 500; }

  /* ── Options ── */
  .options { display: flex; flex-direction: column; gap: 9px; }
  .option {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 14px 18px;
    font-size: 0.9rem;
    cursor: pointer;
    text-align: left;
    color: var(--text);
    transition: border-color 0.18s, background 0.18s, transform 0.1s;
    line-height: 1.4;
    box-shadow: 0 1px 6px rgba(0,0,0,0.2);
  }
  .option:active { transform: scale(0.98); }
  .option.correct {
    border-color: var(--correct);
    background: var(--correct-bg);
    color: var(--correct);
    box-shadow: 0 0 0 3px rgba(52,211,153,0.12);
  }
  .option.wrong {
    border-color: var(--wrong);
    background: var(--wrong-bg);
    color: var(--wrong);
    box-shadow: 0 0 0 3px rgba(248,113,113,0.12);
  }
  .option.reveal {
    border-color: var(--correct);
    background: rgba(52,211,153,0.06);
  }
  .option[disabled] { cursor: default; pointer-events: none; }

  /* ── Feedback ── */
  .feedback {
    margin-top: 12px;
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 0.86rem;
    line-height: 1.5;
    font-weight: 500;
  }
  .feedback.correct { background: var(--correct-bg); color: var(--correct); border: 1px solid rgba(52,211,153,0.2); }
  .feedback.wrong { background: var(--wrong-bg); color: var(--wrong); border: 1px solid rgba(248,113,113,0.2); }

  /* ── Next button ── */
  .next-btn {
    width: 100%;
    margin-top: 12px;
    padding: 15px;
    background: linear-gradient(135deg, var(--accent), #9d8fff);
    color: #fff;
    border: none;
    border-radius: 50px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 20px var(--accent-glow);
    transition: transform 0.1s, box-shadow 0.2s;
    letter-spacing: 0.2px;
  }
  .next-btn:active { transform: scale(0.97); }

  /* ── Result ── */
  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 36px 24px;
    text-align: center;
    margin-top: 16px;
    box-shadow: 0 4px 32px rgba(0,0,0,0.4);
  }
  .result-emoji { font-size: 3rem; margin-bottom: 8px; }
  .result-card h2 { font-size: 1.3rem; font-weight: 800; margin-bottom: 4px; }
  .result-score {
    font-size: 4rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 10px 0;
    line-height: 1;
  }
  .result-card p { color: var(--muted); font-size: 0.9rem; margin-bottom: 24px; line-height: 1.7; }
  .result-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

  /* ── Learn mode ── */
  .learn-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 18px 20px;
    margin-bottom: 10px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.2);
  }
  .learn-q { font-size: 0.9rem; font-weight: 600; margin-bottom: 10px; line-height: 1.5; color: var(--text); }
  .learn-a {
    font-size: 0.88rem;
    color: var(--correct);
    background: var(--correct-bg);
    border-radius: 10px;
    padding: 10px 14px;
    border-left: 3px solid var(--correct);
    font-weight: 500;
  }

  /* ── Empty state ── */
  .empty-state { text-align: center; padding: 70px 20px; color: var(--muted); }
  .empty-state span { font-size: 3.5rem; display: block; margin-bottom: 14px; }
  .empty-state p { font-size: 0.95rem; }

  /* ── Badge ── */
  .badge {
    display: inline-block;
    font-size: 0.65rem;
    padding: 2px 7px;
    border-radius: 20px;
    margin-left: 5px;
    font-weight: 800;
    vertical-align: middle;
  }
  .badge-warn { background: rgba(251,191,36,0.2); color: var(--warning); }
</style>
</head>

<header>
  <h1>Латинский язык</h1>
  <p>Сессия 2026 · 402 вопроса</p>
</header>

  <select id="topicSel" onchange="resetSession()">

const RAW = Uint8Array.from(atob(B64), c=>c.charCodeAt(0));
const ALL_Q = JSON.parse(new TextDecoder("utf-8").decode(RAW));

let mode = 'test';
let shuffle = true;
let questions = [];
let current = 0;
let correct = 0;
let wrong = 0;
let answered = false;
let errors = JSON.parse(localStorage.getItem('latin_errors') || '[]');
let onlyErrors = false;

function switchMode(m) {
  mode = m;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active', ['test','learn','errors'][i]===m));
  onlyErrors = (m === 'errors');
  resetSession();
}

function toggleShuffle() {
  shuffle = !shuffle;
  document.getElementById('shuffleLbl').textContent = shuffle ? 'Вкл' : 'Выкл';
  resetSession();
}

function shuffleArr(a) {
  for (let i=a.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

function updateErrorBadge() {
  document.getElementById('errBadge').textContent = errors.length;
}

function resetSession() {
  current = 0; correct = 0; wrong = 0; answered = false;
  if (mode === 'errors') {
    questions = errors.length ? [...errors] : [];
  } else {
    questions = [...ALL_Q];
  }
  if (shuffle) shuffleArr(questions);
  updateStats();
  updateErrorBadge();
  if (mode === 'learn') renderLearn();
  else renderQuestion();
}

function updateStats() {
  document.getElementById('qNum').textContent = Math.min(current+1, questions.length);
  document.getElementById('qTotal').textContent = questions.length;
  document.getElementById('statC').textContent = correct;
  document.getElementById('statW').textContent = wrong;
  const pct = questions.length ? ((current)/questions.length*100) : 0;
  document.getElementById('progressFill').style.width = pct+'%';
}

function renderLearn() {
  const area = document.getElementById('quizArea');
  if (!questions.length) { area.innerHTML = '<div class="empty-state"><span>📭</span>Нет вопросов</div>'; return; }
  area.innerHTML = questions.map((q,i)=>`
    <div class="learn-card">
      <div class="learn-q">${i+1}. ${q.question}</div>
      <div class="learn-a">✓ ${q.correct}</div>
    </div>`).join('');
}

function renderQuestion() {
  const area = document.getElementById('quizArea');
  updateStats();

  if (!questions.length) {
    area.innerHTML = '<div class="empty-state"><span>📭</span>' + (mode==='errors' ? 'Ошибок нет! Отлично!' : 'Нет вопросов') + '</div>';
    return;
  }

  if (current >= questions.length) { renderResult(); return; }

  const q = questions[current];
  const opts = shuffleArr([q.correct, ...q.incorrect]);

  area.innerHTML = `
    <div class="question-card">
      <div class="question-num">Вопрос ${current+1} из ${questions.length}</div>
      <div class="question-text">${q.question}</div>
    </div>
    <div class="options" id="opts">
      ${opts.map((o,i)=>`<button class="option" id="opt${i}" onclick="choose(${i}, ${JSON.stringify(o)===JSON.stringify(q.correct)})">${o}</button>`).join('')}
    </div>
    <div id="feedback"></div>
    <button class="next-btn" id="nextBtn" style="display:none" onclick="nextQ()">Следующий →</button>
  `;
}

function choose(idx, isCorrect) {
  if (answered) return;
  answered = true;

  const q = questions[current];
  const opts = document.querySelectorAll('.option');
  opts.forEach(o => o.setAttribute('disabled',''));

  const selected = opts[idx];
  selected.classList.add(isCorrect ? 'correct' : 'wrong');

  if (!isCorrect) {
    // highlight correct
    opts.forEach(o => { if (o.textContent === q.correct) o.classList.add('reveal'); });
    wrong++;
    // add to errors if not already present
    if (!errors.find(e=>e.question===q.question)) {
      errors.push(q);
      localStorage.setItem('latin_errors', JSON.stringify(errors));
    }
  } else {
    correct++;
    // remove from errors if existed
    const eIdx = errors.findIndex(e=>e.question===q.question);
    if (eIdx !== -1) { errors.splice(eIdx,1); localStorage.setItem('latin_errors', JSON.stringify(errors)); }
  }

  updateErrorBadge();
  const fb = document.getElementById('feedback');
  fb.className = 'feedback ' + (isCorrect ? 'correct' : 'wrong');
  fb.textContent = isCorrect ? '✓ Правильно!' : '✗ Неверно. Правильный ответ: ' + q.correct;

  document.getElementById('nextBtn').style.display = 'block';
  updateStats();
}

function nextQ() {
  current++;
  answered = false;
  if (current >= questions.length) { renderResult(); return; }
  renderQuestion();
}

function renderResult() {
  const pct = Math.round(correct/questions.length*100);
  const area = document.getElementById('quizArea');
  document.getElementById('progressFill').style.width = '100%';
  area.innerHTML = `
    <div class="result-card">
      <h2>Результат</h2>
      <div class="result-score">${pct}%</div>
      <p>Правильно: ${correct} из ${questions.length}<br>Ошибок: ${wrong}</p>
      <div class="result-actions">
        <button class="btn btn-primary" onclick="resetSession()">Повторить</button>
        ${wrong>0 ? '<button class="btn btn-outline" onclick="switchMode(\'errors\')">Работа над ошибками</button>' : ''}
      </div>
    </div>`;
}

// Init
updateErrorBadge();
resetSession();
</script>
