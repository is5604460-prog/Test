<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Анатомия — Сессия 2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0f14; color: #e0e0e8; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
  
  header { background: #1a1a24; border-bottom: 2px solid #3d2d6e; padding: 14px 20px; text-align: center; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 1.1rem; color: #c9aaff; letter-spacing: 0.05em; }
  header p { font-size: 0.75rem; color: #7070a0; margin-top: 2px; }
  
  .controls { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; background: #13131c; border-bottom: 1px solid #252535; }
  
  .mode-row { display: flex; gap: 8px; }
  .mode-btn { flex: 1; padding: 9px 4px; border: 1px solid #3a2a6a; border-radius: 10px; background: #1e1e2e; color: #9080c0; font-size: 0.82rem; cursor: pointer; transition: all 0.2s; }
  .mode-btn.active { background: #4a2d8a; border-color: #7a4dcf; color: #fff; font-weight: 600; }
  
  .filter-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .filter-label { font-size: 0.75rem; color: #7070a0; white-space: nowrap; }
  select { background: #1e1e2e; color: #c0b0e0; border: 1px solid #3a2a6a; border-radius: 8px; padding: 7px 10px; font-size: 0.82rem; flex: 1; }
  
  .action-row { display: flex; gap: 8px; }
  .btn { flex: 1; padding: 9px 8px; border: 1px solid #3a2a6a; border-radius: 10px; background: #1e1e2e; color: #9080c0; font-size: 0.82rem; cursor: pointer; transition: all 0.2s; }
  .btn:active { transform: scale(0.97); }
  .btn.primary { background: #2d1a5e; border-color: #6040b0; color: #c9aaff; }
  
  .progress-wrap { padding: 10px 16px 6px; background: #13131c; }
  .progress-info { display: flex; justify-content: space-between; font-size: 0.73rem; color: #7070a0; margin-bottom: 5px; }
  .progress-bar { height: 4px; background: #252535; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #6040b0, #9060e0); border-radius: 2px; transition: width 0.3s; }
  
  .card-area { padding: 16px; max-width: 640px; margin: 0 auto; }
  
  .card { background: #1a1a26; border: 1px solid #2a2a40; border-radius: 16px; padding: 20px; margin-bottom: 12px; }
  .q-meta { font-size: 0.7rem; color: #5060a0; margin-bottom: 8px; }
  .q-text { font-size: 1rem; line-height: 1.55; color: #ddd; }
  
  .options { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
  .opt { padding: 13px 16px; border: 1px solid #2a2a44; border-radius: 12px; background: #20202e; color: #c0b8d8; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; line-height: 1.4; text-align: left; width: 100%; }
  .opt:active { transform: scale(0.98); }
  .opt.correct { background: #1a3a1a; border-color: #3a8a3a; color: #80d880; }
  .opt.wrong { background: #3a1a1a; border-color: #8a3a3a; color: #d88080; }
  .opt.reveal { background: #1a2a3a; border-color: #3a6a9a; color: #80b8e0; }
  
  .next-btn { width: 100%; margin-top: 12px; padding: 14px; border: none; border-radius: 12px; background: linear-gradient(135deg, #3d1f7a, #5a30a0); color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; }
  .next-btn:active { transform: scale(0.98); }
  
  .learn-card { text-align: center; }
  .learn-answer { margin-top: 14px; padding: 14px; background: #1a2a1a; border: 1px solid #2a5a2a; border-radius: 12px; color: #80d880; font-size: 0.95rem; display: none; }
  .learn-answer.show { display: block; }
  .show-btn { margin-top: 12px; width: 100%; padding: 12px; border: 1px solid #5a3a9a; border-radius: 12px; background: #2a1a4a; color: #c090ff; font-size: 0.9rem; cursor: pointer; }
  
  .empty { text-align: center; padding: 60px 20px; color: #5060a0; }
  .empty h2 { font-size: 1.1rem; margin-bottom: 8px; color: #7080b0; }
  
  .stats { display: flex; gap: 10px; margin-top: 6px; }
  .stat { flex: 1; background: #1a1a26; border: 1px solid #2a2a40; border-radius: 10px; padding: 10px; text-align: center; }
  .stat-num { font-size: 1.4rem; font-weight: 700; color: #c9aaff; }
  .stat-lbl { font-size: 0.7rem; color: #6070a0; margin-top: 2px; }
  .stat-num.green { color: #70d870; }
  .stat-num.red { color: #d87070; }
</style>
</head>
<body>

<header>
  <h1>Анатомия человека</h1>
  <p>Сессия 2026</p>
</header>

<div class="controls">
  <div class="mode-row">
    <button class="mode-btn active" id="modeTest">📝 Тест</button>
    <button class="mode-btn" id="modeLearn">📖 Учить</button>
    <button class="mode-btn" id="modeErrors">❌ Ошибки</button>
  </div>
  <div class="filter-row">
    <span class="filter-label">Тема:</span>
    <select id="topicFilter">
      <option value="0">Все темы (1200)</option>
    </select>
  </div>
  <div class="action-row">
    <button class="btn primary" id="shuffleBtn">🔀 Перемешать</button>
    <button class="btn" id="restartBtn">🔄 Сначала</button>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-info">
    <span id="progText">0 / 0</span>
    <span id="scoreText">✓ 0 &nbsp; ✗ 0</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
</div>
<div class="progress-wrap" style="padding-top:0;padding-bottom:12px;">
  <div class="stats">
    <div class="stat"><div class="stat-num" id="statTotal">0</div><div class="stat-lbl">Всего</div></div>
    <div class="stat"><div class="stat-num green" id="statCorrect">0</div><div class="stat-lbl">Верно</div></div>
    <div class="stat"><div class="stat-num red" id="statWrong">0</div><div class="stat-lbl">Ошибок</div></div>
    <div class="stat"><div class="stat-num" id="statLeft">0</div><div class="stat-lbl">Осталось</div></div>
  </div>
</div>

<div class="card-area" id="cardArea"></div>

const questions = JSON.parse(new TextDecoder().decode(
  Uint8Array.from(atob(B64), c => c.charCodeAt(0))
));

// Build topic counts
const topicCounts = {};
questions.forEach(q => {
  topicCounts[q.topic] = (topicCounts[q.topic] || 0) + 1;
});
const topicSelect = document.getElementById('topicFilter');
Object.keys(topicCounts).sort((a,b)=>+a-+b).forEach(t => {
  const opt = document.createElement('option');
  opt.value = t;
  opt.textContent = `Тема ${t} (${topicCounts[t]} вопр.)`;
  topicSelect.appendChild(opt);
});

let mode = 'test';
let queue = [];
let current = 0;
let correct = 0;
let wrong = 0;
let answered = false;
let errors = new Set();
let sessionErrors = new Set();

function getPool() {
  const t = +topicSelect.value;
  if (mode === 'errors') {
    return questions.filter((q,i) => errors.has(i));
  }
  return t === 0 ? questions : questions.filter(q => q.topic === t);
}

function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function buildQueue(doShuffle) {
  let pool = getPool().map((q,i) => ({...q, origIdx: questions.indexOf(q)}));
  // Re-find orig index properly
  const t = +topicSelect.value;
  if (mode === 'errors') {
    pool = [];
    errors.forEach(i => pool.push({...questions[i], origIdx: i}));
  } else {
    pool = (t === 0 ? questions : questions.filter(q=>q.topic===t)).map((q,_) => {
      return {...q, origIdx: questions.indexOf(q)};
    });
  }
  if (doShuffle) shuffle(pool);
  return pool;
}

function start(doShuffle) {
  queue = buildQueue(doShuffle);
  current = 0;
  correct = 0;
  wrong = 0;
  sessionErrors.clear();
  answered = false;
  render();
}

function render() {
  updateProgress();
  if (queue.length === 0) {
    showEmpty();
    return;
  }
  if (current >= queue.length) {
    showFinish();
    return;
  }
  const q = queue[current];
  if (mode === 'learn') renderLearn(q);
  else renderTest(q);
}

function updateProgress() {
  const total = queue.length;
  const done = current;
  const pct = total ? (done/total*100) : 0;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progText').textContent = `${done} / ${total}`;
  document.getElementById('scoreText').textContent = `✓ ${correct}   ✗ ${wrong}`;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('statLeft').textContent = Math.max(0, total - done);
}

function renderTest(q) {
  const opts = shuffle([q.correct, ...q.incorrect]);
  const area = document.getElementById('cardArea');
  area.innerHTML = `
    <div class="card">
      <div class="q-meta">Тема ${q.topic} · Вопрос ${current+1} из ${queue.length}</div>
      <div class="q-text">${q.question}</div>
      <div class="options" id="opts"></div>
    </div>
  `;
  const optsDiv = document.getElementById('opts');
  opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = opt;
    btn.addEventListener('click', () => checkAnswer(btn, opt, q.correct, q.origIdx, opts, q));
    optsDiv.appendChild(btn);
  });
  answered = false;
}

function checkAnswer(btn, chosen, correct_ans, origIdx, allOpts, q) {
  if (answered) return;
  answered = true;
  const btns = document.querySelectorAll('.opt');
  btns.forEach(b => {
    if (b.textContent === correct_ans) b.classList.add('correct');
    else if (b === btn && chosen !== correct_ans) b.classList.add('wrong');
  });
  if (chosen === correct_ans) {
    correct++;
  } else {
    wrong++;
    errors.add(origIdx);
    sessionErrors.add(origIdx);
  }
  updateProgress();
  const nextBtn = document.createElement('button');
  nextBtn.className = 'next-btn';
  nextBtn.textContent = current+1 < queue.length ? 'Следующий →' : 'Завершить';
  nextBtn.addEventListener('click', () => { current++; render(); });
  document.getElementById('cardArea').appendChild(nextBtn);
}

function renderLearn(q) {
  const area = document.getElementById('cardArea');
  area.innerHTML = `
    <div class="card learn-card">
      <div class="q-meta">Тема ${q.topic} · ${current+1} из ${queue.length}</div>
      <div class="q-text">${q.question}</div>
      <button class="show-btn" id="showAns">Показать ответ</button>
      <div class="learn-answer" id="answerBox">${q.correct}</div>
    </div>
    <button class="next-btn" id="nextLearn" style="display:none">Следующий →</button>
  `;
  document.getElementById('showAns').addEventListener('click', () => {
    document.getElementById('answerBox').classList.add('show');
    document.getElementById('nextLearn').style.display = 'block';
    document.getElementById('showAns').style.display = 'none';
  });
  document.getElementById('nextLearn').addEventListener('click', () => {
    current++;
    render();
  });
}

function showEmpty() {
  document.getElementById('cardArea').innerHTML = `
    <div class="empty">
      <h2>Нет вопросов</h2>
      <p>В режиме "Ошибки" пока нет сохранённых ошибок</p>
    </div>
  `;
}

function showFinish() {
  const pct = queue.length ? Math.round(correct/queue.length*100) : 0;
  document.getElementById('cardArea').innerHTML = `
    <div class="card" style="text-align:center;padding:30px 20px">
      <div style="font-size:2.5rem;margin-bottom:10px">${pct>=80?'🎉':pct>=60?'👍':'📚'}</div>
      <div style="font-size:1.3rem;font-weight:700;color:#c9aaff;margin-bottom:6px">Завершено!</div>
      <div style="color:#9080c0;font-size:0.9rem;margin-bottom:16px">Правильно: ${correct} из ${queue.length} (${pct}%)</div>
      <button class="next-btn" id="restartEnd">🔄 Пройти снова</button>
      ${sessionErrors.size > 0 ? `<button class="show-btn" id="errorsBtn" style="margin-top:10px">❌ Разобрать ошибки (${sessionErrors.size})</button>` : ''}
    </div>
  `;
  document.getElementById('restartEnd').addEventListener('click', () => start(false));
  const errBtn = document.getElementById('errorsBtn');
  if (errBtn) {
    errBtn.addEventListener('click', () => {
      document.getElementById('modeErrors').click();
    });
  }
}

// Mode buttons
['modeTest','modeLearn','modeErrors'].forEach(id => {
  document.getElementById(id).addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    mode = id === 'modeTest' ? 'test' : id === 'modeLearn' ? 'learn' : 'errors';
    start(false);
  });
});

document.getElementById('shuffleBtn').addEventListener('click', () => start(true));
document.getElementById('restartBtn').addEventListener('click', () => start(false));
document.getElementById('topicFilter').addEventListener('change', () => start(false));

start(false);
</script>
