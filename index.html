<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Биофизика — Тренажёр</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Onest:wght@300;400;500&display=swap');
:root {
  --bg: #0a0a12;
  --surface: #12121e;
  --card: #1a1a2e;
  --border: #2a2a45;
  --accent: #7c6cf8;
  --accent2: #e056a0;
  --green: #3eded4;
  --red: #ff4f6d;
  --text: #e8e8f5;
  --muted: #7070a0;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Onest', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}
.orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.12; pointer-events: none; z-index: 0; }
.orb1 { width: 500px; height: 500px; background: var(--accent); top: -150px; right: -100px; }
.orb2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; left: -100px; }
header { width: 100%; max-width: 860px; padding: 40px 24px 20px; position: relative; z-index: 1; }
.logo { font-family: 'Unbounded', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.3em; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; }
h1 { font-family: 'Unbounded', sans-serif; font-size: clamp(22px, 4vw, 36px); font-weight: 900; line-height: 1.1; background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.stats-bar { width: 100%; max-width: 860px; padding: 0 24px; display: flex; gap: 16px; flex-wrap: wrap; align-items: center; position: relative; z-index: 1; margin-bottom: 24px; }
.stat-chip { background: var(--card); border: 1px solid var(--border); border-radius: 100px; padding: 8px 16px; font-size: 13px; display: flex; align-items: center; gap: 8px; }
.stat-chip .val { font-family: 'Unbounded', sans-serif; font-size: 15px; font-weight: 700; }
.stat-chip.correct .val { color: var(--green); }
.stat-chip.wrong .val { color: var(--red); }
.stat-chip.total .val { color: var(--accent); }
.progress-wrap { flex: 1; min-width: 160px; height: 6px; background: var(--border); border-radius: 100px; overflow: hidden; }
.progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 100px; transition: width 0.4s ease; }
.controls { width: 100%; max-width: 860px; padding: 0 24px; display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 28px; position: relative; z-index: 1; }
.btn { font-family: 'Onest', -apple-system, sans-serif; font-size: 13px; font-weight: 500; padding: 10px 20px; border-radius: 10px; border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; background: var(--card); color: var(--text); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: white; font-weight: 700; }
.mode-selector { display: flex; gap: 0; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.mode-btn { font-family: 'Onest', -apple-system, sans-serif; font-size: 12px; padding: 10px 16px; border: none; cursor: pointer; background: var(--card); color: var(--muted); transition: all 0.2s; border-right: 1px solid var(--border); }
.mode-btn:last-child { border-right: none; }
.mode-btn.active { background: var(--accent); color: white; font-weight: 600; }
.quiz-wrap { width: 100%; max-width: 860px; padding: 0 24px 60px; position: relative; z-index: 1; }
.question-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 32px; margin-bottom: 20px; position: relative; overflow: hidden; animation: slideUp 0.35s cubic-bezier(0.22, 1, 0.36, 1); }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.q-num { font-family: 'Unbounded', sans-serif; font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: 0.2em; margin-bottom: 16px; }
.q-text { font-size: 18px; font-weight: 500; line-height: 1.6; color: var(--text); }
.answers { display: flex; flex-direction: column; gap: 10px; }
.answer-btn { width: 100%; text-align: left; padding: 16px 20px; border-radius: 14px; border: 1.5px solid var(--border); background: var(--surface); color: var(--text); font-family: 'Onest', -apple-system, sans-serif; font-size: 15px; line-height: 1.5; cursor: pointer; transition: all 0.2s; position: relative; display: flex; align-items: flex-start; gap: 12px; }
.answer-btn::before { content: ''; flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); transition: all 0.2s; margin-top: 1px; }
.answer-btn.correct { border-color: var(--green); background: rgba(62,222,212,0.08); }
.answer-btn.correct::before { background: var(--green); border-color: var(--green); box-shadow: 0 0 12px rgba(62,222,212,0.4); }
.answer-btn.wrong { border-color: var(--red); background: rgba(255,79,109,0.08); }
.answer-btn.wrong::before { background: var(--red); border-color: var(--red); }
.answer-btn:disabled { cursor: not-allowed; opacity: 0.85; }
.feedback { border-radius: 14px; padding: 16px 20px; font-size: 14px; line-height: 1.6; display: none; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.feedback.show { display: flex; align-items: flex-start; gap: 12px; }
.feedback.ok { background: rgba(62,222,212,0.1); border: 1px solid rgba(62,222,212,0.3); color: var(--green); }
.feedback.err { background: rgba(255,79,109,0.1); border: 1px solid rgba(255,79,109,0.3); color: var(--red); }
.feedback .icon { font-size: 20px; flex-shrink: 0; }
.feedback .correct-ans { font-weight: 600; color: var(--green); }
.nav-row { display: flex; justify-content: flex-end; align-items: center; margin-top: 20px; gap: 12px; }
.result-screen { display: none; text-align: center; padding: 60px 24px; }
.result-screen.show { display: block; }
.result-big { font-family: 'Unbounded', sans-serif; font-size: clamp(48px, 10vw, 80px); font-weight: 900; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; margin-bottom: 12px; }
.result-sub { font-size: 18px; color: var(--muted); margin-bottom: 32px; }
.result-detail { display: flex; justify-content: center; gap: 32px; margin-bottom: 40px; flex-wrap: wrap; }
.result-item { text-align: center; }
.result-item .num { font-family: 'Unbounded', sans-serif; font-size: 32px; font-weight: 900; }
.result-item .lbl { font-size: 13px; color: var(--muted); margin-top: 4px; }
.browse-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 28px; margin-bottom: 12px; cursor: pointer; transition: all 0.2s; position: relative; }
.browse-card .bq { font-size: 16px; line-height: 1.5; margin-bottom: 0; }
.browse-card .ba { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); color: var(--green); font-size: 15px; display: none; }
.browse-card.open .ba { display: block; }
.browse-card .toggle { position: absolute; right: 20px; top: 22px; color: var(--muted); font-size: 20px; transition: transform 0.2s; }
.browse-card.open .toggle { transform: rotate(180deg); }
.search-wrap { width: 100%; max-width: 860px; padding: 0 24px; position: relative; z-index: 1; margin-bottom: 16px; display: none; }
.search-wrap.show { display: block; }
.search-input { width: 100%; padding: 14px 20px; border-radius: 14px; border: 1.5px solid var(--border); background: var(--card); color: var(--text); font-family: 'Onest', -apple-system, sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s; -webkit-appearance: none; appearance: none; }
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--muted); }
#wrongList { display: flex; flex-direction: column; gap: 10px; }
.formula-badge { display: inline-block; background: rgba(124,108,248,0.15); border: 1px solid rgba(124,108,248,0.3); border-radius: 6px; padding: 2px 8px; font-size: 11px; color: var(--accent); margin-bottom: 10px; font-family: 'Unbounded', sans-serif; letter-spacing: 0.05em; }
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<header>
  <div class="logo">Биофизика · Сессия 2025</div>
  <h1>Тренажёр по тестам</h1>
</header>

<div class="stats-bar">
  <div class="stat-chip total">✦ <span class="val" id="statTotal">0</span> вопросов</div>
  <div class="stat-chip correct">✓ <span class="val" id="statCorrect">0</span></div>
  <div class="stat-chip wrong">✗ <span class="val" id="statWrong">0</span></div>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
</div>

<div class="controls">
  <div class="mode-selector">
    <button class="mode-btn active" id="modeQuiz">🎯 Тест</button>
    <button class="mode-btn" id="modeBrowse">📖 Учить</button>
    <button class="mode-btn" id="modeWrong">❌ Ошибки</button>
  </div>
  <button class="btn primary" id="btnRestart">↺ Заново</button>
  <button class="btn" id="btnShuffle">🔀 Перемешать</button>
</div>

<div class="search-wrap" id="searchWrap">
  <input class="search-input" id="searchInput" placeholder="Поиск по вопросам...">
</div>

<div class="quiz-wrap" id="quizWrap">
  <div id="quizMode">
    <div class="question-card" id="questionCard">
      <div class="q-num" id="qNum">Вопрос 1 / 389</div>
      <div id="formulaBadge" style="display:none"><span class="formula-badge">📐 Формула / Единица</span></div>
      <div class="q-text" id="qText">Загрузка...</div>
    </div>
    <div class="answers" id="answers"></div>
    <div class="feedback" id="feedback">
      <span class="icon"></span>
      <span class="msg"></span>
    </div>
    <div class="nav-row">
      <button class="btn primary" id="nextBtn" style="display:none">Следующий →</button>
    </div>
  </div>

  <div class="result-screen" id="resultScreen">
    <div class="result-big" id="resultPct">0%</div>
    <div class="result-sub" id="resultMsg">Тест завершён!</div>
    <div class="result-detail">
      <div class="result-item"><div class="num" style="color:var(--green)" id="resCorrect">0</div><div class="lbl">Правильно</div></div>
      <div class="result-item"><div class="num" style="color:var(--red)" id="resWrong">0</div><div class="lbl">Ошибки</div></div>
      <div class="result-item"><div class="num" style="color:var(--accent)" id="resTotal">0</div><div class="lbl">Вопросов</div></div>
    </div>
    <button class="btn primary" id="btnRestartResult" style="margin-right:12px">↺ Снова</button>
    <button class="btn" id="btnWrongResult">Разобрать ошибки</button>
  </div>

  <div id="browseMode" style="display:none">
    <div id="browseList"></div>
  </div>

  <div id="wrongMode" style="display:none">
    <div id="wrongList"></div>
  </div>
</div>

<script>
const ALL_QUESTIONS = [{"q": "Изменение размеров и формы предмета вследствие изменения его положения относительно друг друга называется ……", "correct": "деформацией", "wrong": ["твёрдым телом", "аморфное тело", "пластическая деформация"]}, {"q": "Что называется пределом упругости?", "correct": "максимальное напряжение в материале, при котором деформация еще является упругой", "wrong": ["минимальное напряжение в материале, при котором деформация еще является упругой", "физическая величина, показывающая, при какой внешней силе, действующей на вещество,", "происходит разрушение тела"]}, {"q": "Крупные одиночные кристаллы называются …", "correct": "монокристаллами", "wrong": ["поликристаллами", "аморфными телами", "кристаллами"]}, {"q": "Свойства разрушения при небольших деформациях называется …", "correct": "хрупкостью", "wrong": ["прочностью", "пластичностью", "деформацией"]}, {"q": "У каких материалов отсутствует область упругих деформаций.", "correct": "воск, глина, пластилин", "wrong": ["стекло, медь, железо", "воск, железо, стекло", "пластилин, медь, железо"]}, {"q": "Способность выдерживать нагрузки без разрушения называется …", "correct": "прочностью материала", "wrong": ["текучестью материала", "плотностью материалаI: -", "деформация"]}, {"q": "Что из перечисленного является примером кристаллического тела?", "correct": "алмаз", "wrong": ["стекло", "воск", "парафин"]}, {"q": "Какое из перечисленных тел является примером аморфного тела?", "correct": "стекло", "wrong": ["алмаз", "железо", "сталь"]}, {"q": "Что представляют собой линии, соединяющие атомы в кристаллической решетке?", "correct": "силы взаимодействия между атомами", "wrong": ["механическое напряжение между атомами", "аморфные тела между атомами", "деформация между атомами"]}, {"q": "Укажите единицу измерения силы упругости", "correct": "Ньютон (Н)", "wrong": ["Паскаль (Па)", "Джоуль (Дж)", "Ватт (Вт)"]}, {"q": "Укажите единицу измерения абсолютной деформации", "correct": "метр (м)", "wrong": ["Ньютон function isFormula(q) {
  const kw = ['формула', 'единица измерения', 'закон', 'уравнение', 'выведите', 'укажите формулу', 'по какой формуле', 'чему равна', 'скорость, с которой'];
  return kw.some(k => q.q.toLowerCase().includes(k));
}

let questions = [...ALL_QUESTIONS];
let current = 0;
let correct = 0;
let wrong = 0;
let answered = false;
let wrongQuestions = [];
let mode = 'quiz';

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function setMode(m) {
  mode = m;
  document.getElementById('modeQuiz').classList.toggle('active', m === 'quiz');
  document.getElementById('modeBrowse').classList.toggle('active', m === 'browse');
  document.getElementById('modeWrong').classList.toggle('active', m === 'wrong');
  document.getElementById('quizMode').style.display = m === 'quiz' ? 'block' : 'none';
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('browseMode').style.display = m === 'browse' ? 'block' : 'none';
  document.getElementById('wrongMode').style.display = m === 'wrong' ? 'block' : 'none';
  document.getElementById('searchWrap').classList.toggle('show', m === 'browse');
  if (m === 'browse') renderBrowse(ALL_QUESTIONS);
  if (m === 'wrong') renderWrong();
}

function renderBrowse(qs) {
  const el = document.getElementById('browseList');
  el.innerHTML = qs.map((q, i) => {
    const div = document.createElement('div');
    div.className = 'browse-card';
    div.innerHTML = '<div class="q-num" style="font-size:10px;margin-bottom:8px;color:var(--muted)">ВОПРОС ' + (i+1) + (isFormula(q) ? ' · 📐' : '') + '</div><div class="bq">' + escHtml(q.q) + '</div><div class="ba">✓ ' + escHtml(q.correct) + '</div><div class="toggle">▾</div>';
    div.addEventListener('click', function() { this.classList.toggle('open'); });
    return div.outerHTML;
  }).join('');
  // Re-attach listeners
  el.querySelectorAll('.browse-card').forEach(c => {
    c.addEventListener('click', function() { this.classList.toggle('open'); });
  });
}

function filterBrowse() {
  const val = document.getElementById('searchInput').value.toLowerCase();
  const filtered = ALL_QUESTIONS.filter(q =>
    q.q.toLowerCase().includes(val) || q.correct.toLowerCase().includes(val)
  );
  renderBrowse(filtered);
}

function renderWrong() {
  const el = document.getElementById('wrongList');
  if (!wrongQuestions.length) {
    el.innerHTML = '<div style="text-align:center;padding:60px;color:var(--muted)"><div style="font-size:48px;margin-bottom:16px">🎉</div><div style="font-size:18px">Нет ошибок! Пройдите тест сначала.</div></div>';
    return;
  }
  el.innerHTML = wrongQuestions.map(q =>
    '<div class="browse-card"><div class="q-num" style="font-size:10px;margin-bottom:8px;color:var(--red)">ОШИБКА</div><div class="bq">' + escHtml(q.q) + '</div><div class="ba">✓ ' + escHtml(q.correct) + '</div><div class="toggle">▾</div></div>'
  ).join('');
  el.querySelectorAll('.browse-card').forEach(c => {
    c.addEventListener('click', function() { this.classList.toggle('open'); });
  });
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updateStats() {
  const done = correct + wrong;
  document.getElementById('statTotal').textContent = questions.length;
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  const pct = questions.length ? Math.round(done / questions.length * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
}

function loadQuestion() {
  if (current >= questions.length) { showResult(); return; }
  answered = false;
  const q = questions[current];
  document.getElementById('qNum').textContent = 'Вопрос ' + (current + 1) + ' / ' + questions.length;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('formulaBadge').style.display = isFormula(q) ? 'block' : 'none';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('nextBtn').style.display = 'none';

  const opts = shuffle([q.correct, ...q.wrong.slice(0, 3)]);
  const container = document.getElementById('answers');
  container.innerHTML = '';
  opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.type = 'button';
    const span = document.createElement('span');
    span.textContent = opt;
    btn.appendChild(span);
    btn.dataset.val = opt;
    btn.addEventListener('click', function() { checkAnswer(this, this.dataset.val, q.correct); });
    container.appendChild(btn);
  });

  const card = document.getElementById('questionCard');
  card.style.animation = 'none';
  void card.offsetHeight;
  card.style.animation = 'slideUp 0.35s cubic-bezier(0.22, 1, 0.36, 1)';
}

function checkAnswer(btn, chosen, correctAns) {
  if (answered) return;
  answered = true;
  const allBtns = document.querySelectorAll('.answer-btn');
  allBtns.forEach(b => { b.disabled = true; });
  const isCorrect = chosen === correctAns;
  btn.classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) {
    allBtns.forEach(b => { if (b.dataset.val === correctAns) b.classList.add('correct'); });
    wrong++;
    wrongQuestions.push(questions[current]);
  } else { correct++; }
  const fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + (isCorrect ? 'ok' : 'err');
  fb.querySelector('.icon').textContent = isCorrect ? '✓' : '✗';
  if (isCorrect) {
    fb.querySelector('.msg').textContent = 'Правильно!';
  } else {
    fb.querySelector('.msg').innerHTML = 'Правильный ответ: <span class="correct-ans">' + escHtml(correctAns) + '</span>';
  }
  document.getElementById('nextBtn').style.display = 'block';
  updateStats();
}

function nextQuestion() { current++; loadQuestion(); }

function showResult() {
  document.getElementById('quizMode').style.display = 'none';
  const rs = document.getElementById('resultScreen');
  rs.classList.add('show');
  const total = correct + wrong;
  const pct = total ? Math.round(correct / total * 100) : 0;
  document.getElementById('resultPct').textContent = pct + '%';
  document.getElementById('resCorrect').textContent = correct;
  document.getElementById('resWrong').textContent = wrong;
  document.getElementById('resTotal').textContent = total;
  let msg = pct >= 90 ? '🎉 Отлично! Готов к сессии!' : pct >= 70 ? '👍 Хороший результат!' : pct >= 50 ? '📚 Нужно подучить.' : '💪 Продолжай тренироваться!';
  document.getElementById('resultMsg').textContent = msg;
}

function restart() {
  questions = [...ALL_QUESTIONS];
  current = 0; correct = 0; wrong = 0; wrongQuestions = []; answered = false;
  setMode('quiz');
  document.getElementById('quizMode').style.display = 'block';
  document.getElementById('resultScreen').classList.remove('show');
  updateStats(); loadQuestion();
}

function shuffleRestart() {
  questions = shuffle([...ALL_QUESTIONS]);
  current = 0; correct = 0; wrong = 0; wrongQuestions = []; answered = false;
  setMode('quiz');
  document.getElementById('quizMode').style.display = 'block';
  document.getElementById('resultScreen').classList.remove('show');
  updateStats(); loadQuestion();
}

// Wire up all buttons via addEventListener (no inline onclick)
document.getElementById('modeQuiz').addEventListener('click', function() { setMode('quiz'); });
document.getElementById('modeBrowse').addEventListener('click', function() { setMode('browse'); });
document.getElementById('modeWrong').addEventListener('click', function() { setMode('wrong'); });
document.getElementById('btnRestart').addEventListener('click', restart);
document.getElementById('btnShuffle').addEventListener('click', shuffleRestart);
document.getElementById('nextBtn').addEventListener('click', nextQuestion);
document.getElementById('btnRestartResult').addEventListener('click', restart);
document.getElementById('btnWrongResult').addEventListener('click', function() { setMode('wrong'); });
document.getElementById('searchInput').addEventListener('input', filterBrowse);

// Keyboard shortcuts (desktop)
document.addEventListener('keydown', function(e) {
  if (mode !== 'quiz') return;
  if (e.key === 'ArrowRight' || e.key === 'Enter') { if (answered) nextQuestion(); }
  if (['1','2','3','4'].includes(e.key)) {
    const idx = parseInt(e.key) - 1;
    const btns = document.querySelectorAll('.answer-btn');
    if (btns[idx] && !answered) btns[idx].click();
  }
});

updateStats();
loadQuestion();
</script>
</body>
</html>
