<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Гистология — Тренажёр</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Onest:wght@300;400;500&display=swap');
:root{--bg:#0a0a12;--surface:#12121e;--card:#1a1a2e;--border:#2a2a45;--accent:#7c6cf8;--accent2:#e056a0;--green:#3eded4;--red:#ff4f6d;--text:#e8e8f5;--muted:#7070a0;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Onest',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;}
.orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:.12;pointer-events:none;z-index:0;}
.orb1{width:500px;height:500px;background:var(--accent);top:-150px;right:-100px;}
.orb2{width:400px;height:400px;background:var(--accent2);bottom:-100px;left:-100px;}
header{width:100%;max-width:860px;padding:40px 24px 20px;position:relative;z-index:1;}
.logo{font-family:'Unbounded',sans-serif;font-size:11px;font-weight:700;letter-spacing:.3em;color:var(--accent);text-transform:uppercase;margin-bottom:8px;}
h1{font-family:'Unbounded',sans-serif;font-size:clamp(22px,4vw,36px);font-weight:900;line-height:1.1;background:linear-gradient(135deg,var(--text) 0%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.stats-bar{width:100%;max-width:860px;padding:0 24px;display:flex;gap:16px;flex-wrap:wrap;align-items:center;position:relative;z-index:1;margin-bottom:24px;}
.stat-chip{background:var(--card);border:1px solid var(--border);border-radius:100px;padding:8px 16px;font-size:13px;display:flex;align-items:center;gap:8px;}
.stat-chip .val{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:700;}
.stat-chip.correct .val{color:var(--green);}
.stat-chip.wrong .val{color:var(--red);}
.stat-chip.total .val{color:var(--accent);}
.progress-wrap{flex:1;min-width:160px;height:6px;background:var(--border);border-radius:100px;overflow:hidden;}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:100px;transition:width .4s ease;}
.controls{width:100%;max-width:860px;padding:0 24px;display:flex;gap:12px;flex-wrap:wrap;margin-bottom:28px;position:relative;z-index:1;}
.btn{font-family:'Onest',-apple-system,sans-serif;font-size:13px;font-weight:500;padding:10px 20px;border-radius:10px;border:1px solid var(--border);cursor:pointer;transition:all .2s;background:var(--card);color:var(--text);}
.btn.primary{background:var(--accent);border-color:var(--accent);color:white;font-weight:700;}
.mode-selector{display:flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.mode-btn{font-family:'Onest',-apple-system,sans-serif;font-size:12px;padding:10px 16px;border:none;cursor:pointer;background:var(--card);color:var(--muted);transition:all .2s;border-right:1px solid var(--border);}
.mode-btn:last-child{border-right:none;}
.mode-btn.active{background:var(--accent);color:white;font-weight:600;}
.quiz-wrap{width:100%;max-width:860px;padding:0 24px 60px;position:relative;z-index:1;}
.question-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px;margin-bottom:20px;animation:slideUp .35s cubic-bezier(.22,1,.36,1);}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.q-num{font-family:'Unbounded',sans-serif;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.2em;margin-bottom:16px;}
.q-text{font-size:18px;font-weight:500;line-height:1.6;color:var(--text);}
.answers{display:flex;flex-direction:column;gap:10px;}
.answer-btn{width:100%;text-align:left;padding:16px 20px;border-radius:14px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-family:'Onest',-apple-system,sans-serif;font-size:15px;line-height:1.5;cursor:pointer;transition:all .2s;display:flex;align-items:flex-start;gap:12px;}
.answer-btn::before{content:'';flex-shrink:0;width:22px;height:22px;border-radius:50%;border:2px solid var(--border);transition:all .2s;margin-top:1px;}
.answer-btn.correct{border-color:var(--green);background:rgba(62,222,212,.08);}
.answer-btn.correct::before{background:var(--green);border-color:var(--green);box-shadow:0 0 12px rgba(62,222,212,.4);}
.answer-btn.wrong{border-color:var(--red);background:rgba(255,79,109,.08);}
.answer-btn.wrong::before{background:var(--red);border-color:var(--red);}
.answer-btn:disabled{cursor:not-allowed;opacity:.85;}
.feedback{border-radius:14px;padding:16px 20px;font-size:14px;line-height:1.6;display:none;}
.feedback.show{display:flex;align-items:flex-start;gap:12px;}
.feedback.ok{background:rgba(62,222,212,.1);border:1px solid rgba(62,222,212,.3);color:var(--green);}
.feedback.err{background:rgba(255,79,109,.1);border:1px solid rgba(255,79,109,.3);color:var(--red);}
.feedback .icon{font-size:20px;flex-shrink:0;}
.feedback .correct-ans{font-weight:600;color:var(--green);}
.nav-row{display:flex;justify-content:flex-end;margin-top:20px;}
.result-screen{display:none;text-align:center;padding:60px 24px;}
.result-screen.show{display:block;}
.result-big{font-family:'Unbounded',sans-serif;font-size:clamp(48px,10vw,80px);font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:12px;}
.result-sub{font-size:18px;color:var(--muted);margin-bottom:32px;}
.result-detail{display:flex;justify-content:center;gap:32px;margin-bottom:40px;flex-wrap:wrap;}
.result-item .num{font-family:'Unbounded',sans-serif;font-size:32px;font-weight:900;}
.result-item .lbl{font-size:13px;color:var(--muted);margin-top:4px;}
.browse-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:12px;cursor:pointer;position:relative;}
.browse-card .bq{font-size:16px;line-height:1.5;}
.browse-card .ba{margin-top:14px;padding-top:14px;border-top:1px solid var(--border);color:var(--green);font-size:15px;display:none;}
.browse-card.open .ba{display:block;}
.browse-card .toggle{position:absolute;right:20px;top:22px;color:var(--muted);font-size:20px;transition:transform .2s;}
.browse-card.open .toggle{transform:rotate(180deg);}
.search-wrap{width:100%;max-width:860px;padding:0 24px;position:relative;z-index:1;margin-bottom:16px;display:none;}
.search-wrap.show{display:block;}
.search-input{width:100%;padding:14px 20px;border-radius:14px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-family:'Onest',-apple-system,sans-serif;font-size:15px;outline:none;-webkit-appearance:none;}
.search-input:focus{border-color:var(--accent);}
.search-input::placeholder{color:var(--muted);}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<header>
  <div class="logo">Гистология · Сессия 2025</div>
  <h1>Тренажёр по тестам</h1>
</header>
<div class="stats-bar">
  <div class="stat-chip total">✦ <span class="val" id="statTotal">0</span> вопросов</div>
  <div class="stat-chip correct">✓ <span class="val" id="statCorrect">0</span></div>
  <div class="stat-chip wrong">✗ <span class="val" id="statWrong">0</span></div>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
</div>
<div class="controls">
  <div class="mode-selector">
    <button class="mode-btn active" id="modeQuiz">🎯 Тест</button>
    <button class="mode-btn" id="modeBrowse">📖 Учить</button>
    <button class="mode-btn" id="modeWrong">❌ Ошибки</button>
  </div>
  <button class="btn primary" id="btnRestart">↺ Заново</button>
  <button class="btn" id="btnShuffle">🔀 Перемешать</button>
</div>
<div class="search-wrap" id="searchWrap">
  <input class="search-input" id="searchInput" placeholder="Поиск по вопросам...">
</div>
<div class="quiz-wrap">
  <div id="quizMode">
    <div class="question-card" id="questionCard">
      <div class="q-num" id="qNum"></div>
      <div class="q-text" id="qText">Загрузка...</div>
    </div>
    <div class="answers" id="answers"></div>
    <div class="feedback" id="feedback"><span class="icon"></span><span class="msg"></span></div>
    <div class="nav-row">
      <button class="btn primary" id="nextBtn" style="display:none">Следующий →</button>
    </div>
  </div>
  <div class="result-screen" id="resultScreen">
    <div class="result-big" id="resultPct">0%</div>
    <div class="result-sub" id="resultMsg">Тест завершён!</div>
    <div class="result-detail">
      <div class="result-item"><div class="num" style="color:var(--green)" id="resCorrect">0</div><div class="lbl">Правильно</div></div>
      <div class="result-item"><div class="num" style="color:var(--red)" id="resWrong">0</div><div class="lbl">Ошибки</div></div>
      <div class="result-item"><div class="num" style="color:var(--accent)" id="resTotal">0</div><div class="lbl">Вопросов</div></div>
    </div>
    <button class="btn primary" id="btnRestartResult" style="margin-right:12px">↺ Снова</button>
    <button class="btn" id="btnWrongResult">Разобрать ошибки</button>
  </div>
  <div id="browseMode" style="display:none"><div id="browseList"></div></div>
  <div id="wrongMode" style="display:none"><div id="wrongList"></div></div>
</div>
<script>
const ALL_QUESTIONS=[{"q": "Какие виды взятого материала различают по характеру гистологических препаратов?", "correct": "срезы органов", "wrong": ["оболочки", "ткани", "оттиски"]}, {"q": "По характеру взятого материала различают какие виды гистологических препаратов?", "correct": "мазки (крови, костного мозга и т.д.) и отпечатки", "wrong": ["оболочки", "ткани", "оттиски"]}, {"q": "Приготовление препарата включает следующие этапы, кроме...?", "correct": "нагревание взятого материала", "wrong": ["взятие и фиксация материала", "обезвоживание и уплотнение материала", "приготовление срезов и окрашивание препаратов"]}, {"q": "Для приготовления гистологических препаратов из соответствующего органа вырезают кусочки какого размера?", "correct": "0,5 x 1 x 1 см", "wrong": ["2 х 3 х 4 см", "1 х 4 х 5 см", "3 х 6 х 7 см"]}, {"q": "Для приготовления гистологических препаратов для электронной микроскопии из соответствующего органа вырезают кусочки какого размера?", "correct": "1 мм куб.", "wrong": ["2 мм куб.", "1 см куб.", "7мм куб."]}, {"q": "Какие фиксаторы используются для фиксации полученного материала?", "correct": "формалин, метанол", "wrong": ["гематоксилин, эозин", "спиртовая батарея", "парафин, озокерит"]}, {"q": "Для чего производится фиксация?", "correct": "для предупреждения процессов аутолиза (самопереваривания) тканей", "wrong": ["для промывания проточной водой в течение нескольких часов", "для уплотнения, чтобы в последующем их можно было резать на микротоме", "из соответствующего органа вырезают кусочки"]}, {"q": "После фиксации образцы...?", "correct": "промывают проточной водой в течение нескольких часов", "wrong": ["предупреждают процесс аутолиза (самопереваривания) тканей", "из соответствующего органа вырезают кусочки", "образцы уплотняют, чтобы в последующем их можно было резать на"]}, {"q": "Для какой цели при приготовлении препарата используется парафин?", "correct": "образцы уплотняют, чтобы в последующем их можно было резать на", "wrong": ["для предупреждения процессов аутолиза (самопереваривания) тканей", "для промывания проточной водой в течение нескольких часов", "для спиртовой батареи 70 %, 80 %, 96 %, 100 % этанол"]}, {"q": "Для обезвоживания образцов используется...?", "correct": "спиртовая батарея 70 %, 80 %, 96 %, 100 % этанол", "wrong": ["промывают проточной водой в течение нескольких часов", "образцы уплотняют, чтобы в последующем их можно было резать на", "срезы помещают на поверхность тёплой воды для их расправления"]}, {"q": "Какой специальный прибор используется для приготовления срезов?", "correct": "микротом", "wrong": ["скальпель", "пинцет", "ножницы"]}, {"q": "Микротомный нож, направляемый под углом к поверхности парафинового блока, срезает с него...?", "correct": "тонкой слой органа (срез) заданной толщины", "wrong": ["грязь", "пыль", "ненужные органы"]}, {"q": "Толщина срезов на микротоме?", "correct": "1 - 60 мкм", "wrong": ["10 - 60 мкм", "100 - 600 мкм", "1 - 6 мкм"]}, {"q": "Срезы помещают на поверхность тёплой воды для их расправления, а затем...?", "correct": "на предметное стекло", "wrong": ["на стол", "в тёплое помещение", "на баночку"]}, {"q": "Перед окрашиванием образцы освобождают от парафина, проводя по...?", "correct": "ксилол, спирт 100 %, 96 %, 80 %, 70 %, 60 %, вода (по 2-5 мин)", "wrong": ["спиртовая батарея 70 %, 80 %, 96 %, 100 % этанол", "канадский бальзам", "гематоксилин-эозин"]}, {"q": "После окрашивания препарата...?", "correct": "опять обезвоживают (проводя по батарее спиртов с возрастающей", "wrong": ["промывают проточной водой в течение нескольких часов", "в ксилол, спирт 100 %, 96 %, 80 %, 70 %, 60 %, вода (по 2-5 мин)", "срезы помещают на поверхность тёплой воды для их расправления"]}, {"q": "Для удаления лишней краски с окрашенного препарата, используется...?", "correct": "ксилол, талуол", "wrong": ["промывают проточной водой в течение нескольких часов", "срезы помещают на поверхность тёплой воды для их расправления", "все перечисленные"]}, {"q": "После окрашивания ие: «Корковое вещество надпочечников вырабатывает кортикостероиды»?", "correct": "верно", "wrong": ["не верно"]}, {"q": "Верно ли следующее утверждение: «К стероидным гормонам относятся кортизол и эстрогены»?", "correct": "верно", "wrong": ["не верно"]}, {"q": "Верно ли следующее утверждение: «Кальцитониноциты щитовидной железы секретируют тиреотропный гормон»?", "correct": "не верно", "wrong": ["верно"]}, {"q": "Верно ли следующее утверждение: «Паратгормон усиливает активность остеобластов»?", "correct": "не верно", "wrong": ["верно"]}, {"q": "Верно ли следующее утверждение: «Паренхима околощитовидной железы образована главными и оксифильными паратироцитами»?", "correct": "верно", "wrong": ["не верно"]}, {"q": "Верно ли следующее утверждение: «К эндокринным железам со смешанной секрецией относятся поджелудочная железа, гонады и плацента»?", "correct": "верно", "wrong": ["не верно"]}, {"q": "Верно ли следующее утверждение: «Суданофобные клетки надпочечника располагаются в мозговом веществе»?", "correct": "не верно", "wrong": ["верно"]}, {"q": "Верно ли следующее утверждение: «Специфичность действия гормонов определяется концентрацией гормона в крови»?", "correct": "не верно", "wrong": ["верно"]}, {"q": "Верно ли следующее утверждение: «Структурно-функциональной единицей щитовидной железы является долька»?", "correct": "не верно", "wrong": ["верно"]}, {"q": "Верно ли следующее утверждение: «К периферическим органам эндокринной системы относятся щитовидная и паращитовидная железы, а также надпочечники»?", "correct": "верно", "wrong": ["не верно"]}, {"q": "Верно ли следующее утверждение: «Удаление эпифиза приводит к снижению содержания кальция в крови»?", "correct": "не верно", "wrong": ["верно"]}];
let questions=[...ALL_QUESTIONS],current=0,correct=0,wrong=0,answered=false,wrongQuestions=[],mode='quiz';
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function setMode(m){mode=m;['Quiz','Browse','Wrong'].forEach(x=>document.getElementById('mode'+x).classList.toggle('active',m===x.toLowerCase()));document.getElementById('quizMode').style.display=m==='quiz'?'block':'none';document.getElementById('resultScreen').classList.remove('show');document.getElementById('browseMode').style.display=m==='browse'?'block':'none';document.getElementById('wrongMode').style.display=m==='wrong'?'block':'none';document.getElementById('searchWrap').classList.toggle('show',m==='browse');if(m==='browse')renderBrowse(ALL_QUESTIONS);if(m==='wrong')renderWrong();}
function attachCards(el){el.querySelectorAll('.browse-card').forEach(c=>c.addEventListener('click',function(){this.classList.toggle('open');}));}
function renderBrowse(qs){const el=document.getElementById('browseList');el.innerHTML=qs.map((q,i)=>'<div class="browse-card"><div class="q-num" style="font-size:10px;margin-bottom:8px;color:var(--muted)">ВОПРОС '+(i+1)+'</div><div class="bq">'+esc(q.q)+'</div><div class="ba">✓ '+esc(q.correct)+'</div><div class="toggle">▾</div></div>').join('');attachCards(el);}
function renderWrong(){const el=document.getElementById('wrongList');if(!wrongQuestions.length){el.innerHTML='<div style="text-align:center;padding:60px;color:var(--muted)"><div style="font-size:48px;margin-bottom:16px">🎉</div><div>Нет ошибок!</div></div>';return;}el.innerHTML=wrongQuestions.map(q=>'<div class="browse-card"><div class="q-num" style="font-size:10px;margin-bottom:8px;color:var(--red)">ОШИБКА</div><div class="bq">'+esc(q.q)+'</div><div class="ba">✓ '+esc(q.correct)+'</div><div class="toggle">▾</div></div>').join('');attachCards(el);}
function updateStats(){const done=correct+wrong;document.getElementById('statTotal').textContent=questions.length;document.getElementById('statCorrect').textContent=correct;document.getElementById('statWrong').textContent=wrong;document.getElementById('progressBar').style.width=(questions.length?Math.round(done/questions.length*100):0)+'%';}
function loadQuestion(){if(current>=questions.length){showResult();return;}answered=false;const q=questions[current];document.getElementById('qNum').textContent='Вопрос '+(current+1)+' / '+questions.length;document.getElementById('qText').textContent=q.q;document.getElementById('feedback').className='feedback';document.getElementById('nextBtn').style.display='none';const opts=shuffle([q.correct,...q.wrong.slice(0,3)]);const container=document.getElementById('answers');container.innerHTML='';opts.forEach(opt=>{const btn=document.createElement('button');btn.className='answer-btn';btn.type='button';const span=document.createElement('span');span.textContent=opt;btn.appendChild(span);btn.dataset.val=opt;btn.addEventListener('click',function(){checkAnswer(this,this.dataset.val,q.correct);});container.appendChild(btn);});const card=document.getElementById('questionCard');card.style.animation='none';void card.offsetHeight;card.style.animation='slideUp .35s cubic-bezier(.22,1,.36,1)';}
function checkAnswer(btn,chosen,correctAns){if(answered)return;answered=true;document.querySelectorAll('.answer-btn').forEach(b=>{b.disabled=true;});const ok=chosen===correctAns;btn.classList.add(ok?'correct':'wrong');if(!ok){document.querySelectorAll('.answer-btn').forEach(b=>{if(b.dataset.val===correctAns)b.classList.add('correct');});wrong++;wrongQuestions.push(questions[current]);}else correct++;const fb=document.getElementById('feedback');fb.className='feedback show '+(ok?'ok':'err');fb.querySelector('.icon').textContent=ok?'✓':'✗';fb.querySelector('.msg').innerHTML=ok?'Правильно!':'Правильный ответ: <span class="correct-ans">'+esc(correctAns)+'</span>';document.getElementById('nextBtn').style.display='block';updateStats();}
function showResult(){document.getElementById('quizMode').style.display='none';document.getElementById('resultScreen').classList.add('show');const total=correct+wrong,pct=total?Math.round(correct/total*100):0;document.getElementById('resultPct').textContent=pct+'%';document.getElementById('resCorrect').textContent=correct;document.getElementById('resWrong').textContent=wrong;document.getElementById('resTotal').textContent=total;document.getElementById('resultMsg').textContent=pct>=90?'🎉 Отлично!':pct>=70?'👍 Хороший результат!':pct>=50?'📚 Нужно подучить.':'💪 Продолжай тренироваться!';}
function restart(s){questions=s?shuffle([...ALL_QUESTIONS]):[...ALL_QUESTIONS];current=0;correct=0;wrong=0;wrongQuestions=[];answered=false;setMode('quiz');document.getElementById('quizMode').style.display='block';document.getElementById('resultScreen').classList.remove('show');updateStats();loadQuestion();}
document.getElementById('modeQuiz').addEventListener('click',()=>setMode('quiz'));
document.getElementById('modeBrowse').addEventListener('click',()=>setMode('browse'));
document.getElementById('modeWrong').addEventListener('click',()=>setMode('wrong'));
document.getElementById('btnRestart').addEventListener('click',()=>restart(false));
document.getElementById('btnShuffle').addEventListener('click',()=>restart(true));
document.getElementById('nextBtn').addEventListener('click',()=>{current++;loadQuestion();});
document.getElementById('btnRestartResult').addEventListener('click',()=>restart(false));
document.getElementById('btnWrongResult').addEventListener('click',()=>setMode('wrong'));
document.getElementById('searchInput').addEventListener('input',function(){const v=this.value.toLowerCase();renderBrowse(ALL_QUESTIONS.filter(q=>q.q.toLowerCase().includes(v)||q.correct.toLowerCase().includes(v)));});
document.addEventListener('keydown',function(e){if(mode!=='quiz')return;if((e.key==='ArrowRight'||e.key==='Enter')&&answered){current++;loadQuestion();}if(['1','2','3','4'].includes(e.key)){const btns=document.querySelectorAll('.answer-btn');if(btns[+e.key-1]&&!answered)btns[+e.key-1].click();}});
updateStats();loadQuestion();
</script>
