<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Медицинская платформа</title>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@600;700&family=Onest:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0a0a12; --surface:#12121e; --card:#18182a; --border:#262640;
      --accent:#7c6cf8; --accent2:#c9aaff; --correct:#3eded4;
      --wrong:#ff4f6d; --orange:#e09050; --text:#dcdcec; --muted:#6060a0;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;width:100%}
    body{background:var(--bg);color:var(--text);font-family:'Onest',system-ui,sans-serif;overflow:hidden;display:flex;flex-direction:column}
    header{background:#141422;border-bottom:2px solid #2d2060;padding:12px 16px;flex-shrink:0;display:flex;align-items:center;gap:12px;min-height:52px}
    .back-btn{background:none;border:none;color:var(--accent);font-size:1.3rem;cursor:pointer;padding:4px 8px;display:none;flex-shrink:0}
    .back-btn.show{display:block}
    .hdr-title{flex:1;min-width:0}
    .hdr-title h1{font-family:'Unbounded',sans-serif;font-size:.82rem;color:var(--accent2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .hdr-title p{font-size:.63rem;color:var(--muted);margin-top:2px}
    main{flex:1;overflow:hidden;display:flex;flex-direction:column}

    /* HOME */
    #homeScreen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px 16px 40px;display:flex;flex-direction:column}
    #homeScreen.hidden{display:none}
    .home-header{text-align:center;margin-bottom:28px}
    .home-header h1{font-family:'Unbounded',sans-serif;font-size:1.4rem;font-weight:700;background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
    .home-header p{color:var(--muted);font-size:.83rem}
    .subjects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
    .subject-card{background:var(--card);border:2px solid var(--border);border-radius:16px;padding:20px 16px;text-align:center;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
    .subject-card::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .25s;background:linear-gradient(135deg,rgba(124,108,248,.2),rgba(201,170,255,.08))}
    .subject-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,108,248,.2)}
    .subject-card:hover::before,.subject-card:active::before{opacity:1}
    .subject-card:active{transform:scale(.97)}
    .subject-icon{font-size:2.2rem;margin-bottom:10px;display:block}
    .subject-name{font-size:.95rem;font-weight:600;color:var(--text)}
    .subject-count{font-size:.65rem;color:var(--muted);margin-top:4px}

    /* TOPIC SCREEN */
    #topicScreen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px 40px;display:none;flex-direction:column}
    #topicScreen.active{display:flex}
    .ts-header{margin-bottom:18px}
    .ts-header h2{font-family:'Unbounded',sans-serif;font-size:1rem;color:var(--accent2);margin-bottom:4px}
    .ts-header p{font-size:.75rem;color:var(--muted)}
    .menu-stats{display:flex;gap:8px;margin-bottom:18px}
    .menu-stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 14px;text-align:center;flex:1}
    .menu-stat-num{font-size:1.1rem;font-weight:700;color:var(--accent2);font-family:'Unbounded',sans-serif}
    .menu-stat-lbl{font-size:.58rem;color:var(--muted);margin-top:2px}
    .topics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px}
    .topic-card{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:16px 14px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
    .topic-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(124,108,248,.18),rgba(201,170,255,.08));opacity:0;transition:opacity .25s}
    .topic-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,108,248,.2)}
    .topic-card:hover::before,.topic-card:active::before{opacity:1}
    .topic-card:active{transform:scale(.97)}
    .tc-num{font-family:'Unbounded',sans-serif;font-size:.68rem;color:var(--accent);margin-bottom:6px;position:relative;z-index:1}
    .tc-name{font-size:.78rem;font-weight:600;color:var(--text);line-height:1.4;position:relative;z-index:1}
    .tc-count{font-size:.62rem;color:var(--muted);margin-top:4px;position:relative;z-index:1}
    .tc-progress{position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--border)}
    .tc-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .3s}

    /* TRAINER */
    #trainerScreen{flex:1;display:none;flex-direction:column;overflow:hidden}
    #trainerScreen.active{display:flex}
    .mode-tabs{display:flex;background:var(--surface);border-bottom:2px solid var(--border);flex-shrink:0}
    .mode-tab{flex:1;padding:11px 6px;text-align:center;font-size:.74rem;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap}
    .mode-tab.active{color:var(--accent2);border-bottom-color:var(--accent);font-weight:600}
    .topic-pills{display:flex;gap:6px;padding:10px 14px;overflow-x:auto;-webkit-overflow-scrolling:touch;background:var(--surface);flex-shrink:0;scrollbar-width:none}
    .topic-pills::-webkit-scrollbar{display:none}
    .topic-pill{flex-shrink:0;padding:5px 12px;background:var(--card);border:1px solid var(--border);border-radius:20px;font-size:.7rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all .2s;white-space:nowrap}
    .topic-pill.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
    .progress-wrap{padding:8px 14px;background:var(--card);flex-shrink:0}
    .progress-info{display:flex;justify-content:space-between;font-size:.61rem;color:var(--muted);margin-bottom:4px}
    .progress-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .3s}
    .stats{display:flex;gap:6px;padding:8px 14px;background:var(--surface);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
    .stats::-webkit-scrollbar{display:none}
    .stat{flex:1;min-width:60px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 4px;text-align:center}
    .stat-num{font-size:1rem;font-weight:700}
    .stat-num.c{color:var(--correct)}.stat-num.w{color:var(--wrong)}.stat-num.s{color:var(--orange)}.stat-num.t{color:var(--accent2)}
    .stat-lbl{font-size:.53rem;color:var(--muted);margin-top:1px}
    .content-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
    .content{padding:12px;max-width:700px;margin:0 auto}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;animation:slideUp .28s ease}
    @keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .q-meta{font-size:.61rem;color:var(--muted);margin-bottom:8px;font-weight:500}
    .q-text{font-size:.92rem;line-height:1.55;color:var(--text);margin-bottom:14px;font-weight:500}
    .options{display:flex;flex-direction:column;gap:7px}
    .opt{padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text);font-size:.83rem;cursor:pointer;transition:all .18s;text-align:left;line-height:1.4;font-weight:500;font-family:inherit;width:100%}
    .opt:active{transform:scale(.98)}
    .opt.correct{background:rgba(62,222,212,.13);border-color:var(--correct);color:var(--correct)}
    .opt.wrong{background:rgba(255,79,109,.13);border-color:var(--wrong);color:var(--wrong)}
    .opt.reveal{background:rgba(224,144,80,.12);border-color:var(--orange);color:var(--orange)}
    .opt:disabled{cursor:default}
    .feedback{margin-top:12px;padding:11px 13px;border-radius:10px;font-size:.83rem;line-height:1.4;display:none}
    .feedback.show{display:block}
    .feedback.ok{background:rgba(62,222,212,.12);border:1px solid rgba(62,222,212,.3);color:var(--correct)}
    .feedback.err{background:rgba(255,79,109,.12);border:1px solid rgba(255,79,109,.3);color:var(--wrong)}
    .learn-answer{margin-top:10px;padding:11px 13px;background:rgba(62,222,212,.08);border:1px solid rgba(62,222,212,.2);border-radius:10px;color:var(--correct);font-size:.83rem;line-height:1.4;display:none}
    .learn-answer.show{display:block}
    .next-btn{width:100%;margin-top:10px;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,#3a1e70,#5a30a0);color:#fff;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
    .next-btn:active{transform:scale(.98)}
    .show-btn{width:100%;margin-top:10px;padding:10px;border:1.5px solid var(--accent);border-radius:10px;background:transparent;color:var(--accent);font-size:.81rem;cursor:pointer;font-weight:500;font-family:inherit}
    .empty{text-align:center;padding:40px 20px;color:var(--muted)}
    .empty h2{font-size:1rem;margin-bottom:6px;color:var(--text);font-weight:600}
    .empty p{font-size:.82rem}
    .result-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px 20px;text-align:center;animation:slideUp .3s ease}
    .result-card h2{font-family:'Unbounded',sans-serif;font-size:1rem;color:var(--accent2);margin-bottom:8px}
    .result-score{font-size:2.4rem;font-weight:700;font-family:'Unbounded',sans-serif;background:linear-gradient(135deg,var(--correct),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:12px 0}
    .result-card p{color:var(--muted);font-size:.83rem;margin-bottom:16px}
    .restart-btn{padding:12px 24px;border:none;border-radius:10px;background:linear-gradient(135deg,#3a1e70,#5a30a0);color:#fff;font-size:.88rem;font-weight:600;cursor:pointer;font-family:inherit}
    .browse-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
    .browse-q{font-size:.87rem;font-weight:500;color:var(--text);margin-bottom:8px;line-height:1.4}
    .browse-a{padding:8px 12px;background:rgba(62,222,212,.08);border:1px solid rgba(62,222,212,.2);border-radius:8px;font-size:.81rem;color:var(--correct);line-height:1.4}
    .browse-num{font-size:.61rem;color:var(--muted);margin-bottom:6px}
    .err-badge{display:inline-block;background:var(--wrong);color:#fff;border-radius:10px;padding:1px 6px;font-size:.62rem;font-weight:700;margin-left:4px;vertical-align:middle}
    @media(max-width:480px){.subjects-grid{grid-template-columns:repeat(2,1fr)}.topics-grid{grid-template-columns:repeat(2,1fr)}.opt{font-size:.79rem;padding:10px 11px}.q-text{font-size:.87rem}}
  </style>
</head>
<body>
<header id="mainHeader">
  <button class="back-btn" id="backBtn">←</button>
  <div class="hdr-title">
    <h1 id="headerTitle">📚 Медицинская платформа</h1>
    <p id="headerSubtitle">Выберите предмет</p>
  </div>
</header>
<main>
  <div id="homeScreen">
    <div class="home-header"><h1>📚 Мед платформа</h1><p>Интерактивный тренажёр</p></div>
    <div class="subjects-grid" id="subjectsGrid"></div>
  </div>
  <div id="topicScreen">
    <div class="ts-header"><h2 id="tsTitle"></h2><p id="tsSub"></p></div>
    <div class="menu-stats">
      <div class="menu-stat"><div class="menu-stat-num" id="tsTotal">0</div><div class="menu-stat-lbl">Всего вопросов</div></div>
      <div class="menu-stat"><div class="menu-stat-num" id="tsErrors">0</div><div class="menu-stat-lbl">Ошибок</div></div>
      <div class="menu-stat"><div class="menu-stat-num" id="tsProgress">0%</div><div class="menu-stat-lbl">Прогресс</div></div>
    </div>
    <div class="topics-grid" id="topicsGrid"></div>
  </div>
  <div id="trainerScreen">
    <div class="mode-tabs">
      <div class="mode-tab active" id="tabTest">📝 Тест</div>
      <div class="mode-tab" id="tabLearn">📖 Учить</div>
      <div class="mode-tab" id="tabErrors">❌ Ошибки<span class="err-badge" id="errCount" style="display:none">0</span></div>
      <div class="mode-tab" id="tabBrowse">📋 Список</div>
    </div>
    <div class="topic-pills" id="topicPills"></div>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-info"><span id="progressText">Вопрос 1 из 1</span><span id="progressPercent">0%</span></div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div class="stats" id="statsContainer">
      <div class="stat"><div class="stat-num c" id="stC">0</div><div class="stat-lbl">✓ Верно</div></div>
      <div class="stat"><div class="stat-num w" id="stW">0</div><div class="stat-lbl">✗ Ошибки</div></div>
      <div class="stat"><div class="stat-num s" id="stS">0</div><div class="stat-lbl">⊘ Пропуск</div></div>
      <div class="stat"><div class="stat-num t" id="stT">0</div><div class="stat-lbl">Всего</div></div>
    </div>
    <div class="content-wrap" id="contentWrap"><div class="content" id="contentArea"></div></div>
  </div>
</main>

<script id="subjectsData" type="application/json">{"anatomy":{"name":"Анатомия","icon":"🦴","color":"#7c6cf8","topics":{"t1":{"name":"Тема 1 — Рот, глотка, пищевод, желудок","q":[{"q":"Какие важные функции закреплены за ротовой полостью?","correct":"пищеварительная и речевая","wrong":["дыхательная и выделительная","эндокринная и защитная","кроветворная и терморегуляторная"]},{"q":"Какие отделы различают в полости рта?","correct":"vestibulum oris, cavitas oris propria","wrong":["pars nasalis, pars oralis","cavitas nasi, cavitas oris","vestibulum nasi, cavitas pharyngis"]},{"q":"Чем ограничено vestibulum oris?","correct":"губами щеками снаружи, зубами и деснами снутри","wrong":["языком и твердым нёбом","мягким нёбом и зевом","щеками снаружи и языком внутри"]},{"q":"Какая мышца находится в толще губ?","correct":"m. orbicularis oris","wrong":["m. buccinator","m. masseter","m. temporalis"]},{"q":"Чем образована костная основа твердого нёба?","correct":"небный отросток верхней челюсти, горизонтальная пластинка небной кости","wrong":["скуловая кость и нижняя челюсть","сошник и решетчатая кость","клиновидная кость и нижняя носовая раковина"]},{"q":"Что отграничивает полость рта с полостью носа?","correct":"palatum durum, palatum molle","wrong":["lingua и gingiva","uvula и pharynx","vestibulum oris и zygoma"]},{"q":"Какая мышца находится в толще щеки?","correct":"m. buccinator","wrong":["m. orbicularis oris","m. styloglossus","m. mylohyoideus"]},{"q":"Какие отделы пищеварительного тракта разграничивает нёбная занавеска?","correct":"полость рта и ротоглотки","wrong":["носоглотку и гортаноглотку","пищевод и желудок","полость носа и глотку"]},{"q":"Где находятся нёбные миндалины?","correct":"между передней и задней небными дужками","wrong":["в области свода глотки","на корне языка","в полости носа"]},{"q":"Какие отделы пищеварительного тракта сообщаются через зев?","correct":"полость рта и ротоглотки","wrong":["носоглотка и ротоглотка","гортаноглотка и пищевод","полость носа и р <script>
// Parse data from JSON script tag (avoids iOS Safari large-script parse errors)
const SUBJECTS = JSON.parse(document.getElementById('subjectsData').textContent);

// ========== STATE ==========
let currentSubject = null;
let currentTopic = 'all';
let mode = 'test';
let queue = [];
let qIdx = 0;
let answered = false;
let stats = {c:0,w:0,s:0};
let _keyHandler = null;

// ========== SCREENS ==========
function showHome() {
  document.getElementById('homeScreen').classList.remove('hidden');
  document.getElementById('topicScreen').classList.remove('active');
  document.getElementById('trainerScreen').classList.remove('active');
  document.getElementById('backBtn').classList.remove('show');
  document.getElementById('headerTitle').textContent = '📚 Медицинская платформа';
  document.getElementById('headerSubtitle').textContent = 'Выберите предмет';
  currentSubject = null;
  renderHome();
}

function showTopicScreen(subjKey) {
  currentSubject = subjKey;
  currentTopic = 'all';
  const subj = SUBJECTS[subjKey];
  document.getElementById('homeScreen').classList.add('hidden');
  document.getElementById('topicScreen').classList.add('active');
  document.getElementById('trainerScreen').classList.remove('active');
  document.getElementById('backBtn').classList.add('show');
  document.getElementById('headerTitle').textContent = subj.icon + ' ' + subj.name;
  document.getElementById('headerSubtitle').textContent = subj.name;
  renderTopicScreen();
}

function showTrainer(subjKey, topicKey) {
  currentSubject = subjKey;
  currentTopic = topicKey || 'all';
  const subj = SUBJECTS[subjKey];
  const tname = (topicKey && topicKey !== 'all') ? subj.topics[topicKey].name : 'Все темы';
  document.getElementById('homeScreen').classList.add('hidden');
  document.getElementById('topicScreen').classList.remove('active');
  document.getElementById('trainerScreen').classList.add('active');
  document.getElementById('backBtn').classList.add('show');
  document.getElementById('headerTitle').textContent = subj.icon + ' ' + tname.replace(/^Тема \d+ — /,'');
  document.getElementById('headerSubtitle').textContent = subj.name + ' · ' + tname;
  buildPills();
  scrollPillActive();
  // Reset badge for THIS subject before setting mode
  updateErrBadge();
  setMode('test');
}

document.getElementById('backBtn').addEventListener('click', () => {
  removeKeyHandler();
  if (document.getElementById('trainerScreen').classList.contains('active')) {
    showTopicScreen(currentSubject);
  } else {
    showHome();
  }
});

// ========== HOME ==========
function renderHome() {
  const grid = document.getElementById('subjectsGrid');
  grid.innerHTML = '';
  for (const [key, subj] of Object.entries(SUBJECTS)) {
    const total = Object.values(subj.topics).reduce((s,t)=>s+t.q.length,0);
    const topicCount = Object.keys(subj.topics).length;
    const card = document.createElement('div');
    card.className = 'subject-card';
    card.innerHTML = '<span class="subject-icon">'+subj.icon+'</span><div class="subject-name">'+subj.name+'</div><div class="subject-count">'+total+' вопросов · '+topicCount+' тем</div>';
    card.addEventListener('click', () => showTopicScreen(key));
    grid.appendChild(card);
  }
}

// ========== TOPIC SCREEN ==========
function renderTopicScreen() {
  const subj = SUBJECTS[currentSubject];
  const allQ = Object.values(subj.topics).reduce((s,t)=>s+t.q.length,0);
  const allErr = Object.keys(subj.topics).reduce((s,k)=>s+getErrors(currentSubject,k),0);
  const allDone = Object.keys(subj.topics).reduce((s,k)=>s+getDone(currentSubject,k),0);
  document.getElementById('tsTitle').textContent = subj.icon+' '+subj.name;
  document.getElementById('tsSub').textContent = Object.keys(subj.topics).length+' тем · '+allQ+' вопросов';
  document.getElementById('tsTotal').textContent = allQ;
  document.getElementById('tsErrors').textContent = allErr;
  document.getElementById('tsProgress').textContent = Math.round((allDone/allQ)*100)+'%';

  const grid = document.getElementById('topicsGrid');
  grid.innerHTML = '';

  // "All topics" card
  const allPct = Math.round((allDone/allQ)*100);
  const ac = document.createElement('div');
  ac.className = 'topic-card';
  ac.innerHTML = '<div class="tc-num">Все темы</div><div class="tc-name">'+subj.name+'</div><div class="tc-count">'+allQ+' вопросов</div><div class="tc-progress"><div class="tc-progress-fill" style="width:'+allPct+'%"></div></div>';
  ac.addEventListener('click', () => showTrainer(currentSubject, 'all'));
  grid.appendChild(ac);

  for (const [key, topic] of Object.entries(subj.topics)) {
    const num = key.slice(1);
    const err = getErrors(currentSubject, key);
    const done = getDone(currentSubject, key);
    const pct = Math.round((done/topic.q.length)*100);
    const card = document.createElement('div');
    card.className = 'topic-card';
    const errHtml = err > 0 ? ' · <span style="color:var(--wrong)">'+err+' ош.</span>' : '';
    card.innerHTML = '<div class="tc-num">Тема '+num+'</div><div class="tc-name">'+topic.name.replace(/^Тема \d+ — /,'')+'</div><div class="tc-count">'+topic.q.length+' вопросов'+errHtml+'</div><div class="tc-progress"><div class="tc-progress-fill" style="width:'+pct+'%"></div></div>';
    card.addEventListener('click', () => showTrainer(currentSubject, key));
    grid.appendChild(card);
  }
}

// ========== HELPERS ==========
function lsKey(subjKey, topicKey, idx, type) {
  return subjKey + '_' + topicKey + '_' + idx + '_' + type;
}
function getErrors(subjKey, topicKey) {
  const qs = SUBJECTS[subjKey].topics[topicKey].q;
  return qs.filter((_,i) => localStorage.getItem(lsKey(subjKey,topicKey,i,'w')) === '1').length;
}
function getDone(subjKey, topicKey) {
  const qs = SUBJECTS[subjKey].topics[topicKey].q;
  return qs.filter((_,i) => localStorage.getItem(lsKey(subjKey,topicKey,i,'c')) === '1').length;
}

// ========== PILLS ==========
function buildPills() {
  const pills = document.getElementById('topicPills');
  pills.innerHTML = '';
  const subj = SUBJECTS[currentSubject];

  const ap = document.createElement('div');
  ap.className = 'topic-pill' + (currentTopic==='all' ? ' active' : '');
  ap.textContent = 'Все темы';
  ap.addEventListener('click', () => { currentTopic='all'; refreshPills(); updateQueue(); });
  pills.appendChild(ap);

  for (const key of Object.keys(subj.topics)) {
    const num = key.slice(1);
    const pill = document.createElement('div');
    pill.className = 'topic-pill' + (currentTopic===key ? ' active' : '');
    pill.textContent = 'Тема '+num;
    pill.dataset.key = key;
    pill.addEventListener('click', () => { currentTopic=key; refreshPills(); updateQueue(); });
    pills.appendChild(pill);
  }
}
function refreshPills() {
  document.querySelectorAll('.topic-pill').forEach(p => {
    const k = p.dataset.key;
    p.classList.toggle('active', k ? k===currentTopic : currentTopic==='all');
  });
}
function scrollPillActive() {
  setTimeout(() => {
    const a = document.querySelector('.topic-pill.active');
    if (a) a.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  }, 80);
}

// ========== MODE TABS ==========
document.getElementById('tabTest').addEventListener('click', () => setMode('test'));
document.getElementById('tabLearn').addEventListener('click', () => setMode('learn'));
document.getElementById('tabErrors').addEventListener('click', () => setMode('errors'));
document.getElementById('tabBrowse').addEventListener('click', () => setMode('browse'));

function setMode(m) {
  mode = m;
  qIdx = 0; answered = false; stats = {c:0,w:0,s:0};
  removeKeyHandler();
  ['test','learn','errors','browse'].forEach(id => {
    document.getElementById('tab'+id.charAt(0).toUpperCase()+id.slice(1)).classList.toggle('active', id===m);
  });
  const showStats = m !== 'browse';
  document.getElementById('progressWrap').style.display = showStats ? '' : 'none';
  document.getElementById('statsContainer').style.display = showStats ? '' : 'none';
  updateErrBadge();
  updateQueue();
}

function updateErrBadge() {
  if (!currentSubject) return;
  const subj = SUBJECTS[currentSubject];
  let total = Object.keys(subj.topics).reduce((s,k)=>s+getErrors(currentSubject,k),0);
  const badge = document.getElementById('errCount');
  badge.style.display = total > 0 ? '' : 'none';
  badge.textContent = total;
}

// ========== QUEUE ==========
function getQuestions() {
  const subj = SUBJECTS[currentSubject];
  let qs = [];
  if (currentTopic === 'all') {
    for (const [key, topic] of Object.entries(subj.topics)) {
      topic.q.forEach((q,i) => qs.push({q:q.q, correct:q.correct, wrong:q.wrong, _key:key, _idx:i}));
    }
  } else {
    const topic = subj.topics[currentTopic];
    topic.q.forEach((q,i) => qs.push({q:q.q, correct:q.correct, wrong:q.wrong, _key:currentTopic, _idx:i}));
  }
  return qs;
}
function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}
function updateQueue() {
  let all = getQuestions();
  if (mode==='errors') {
    all = all.filter(q => localStorage.getItem(lsKey(currentSubject,q._key,q._idx,'w')) === '1');
  }
  if (mode==='browse') { renderBrowse(all); return; }
  queue = shuffle(all);
  qIdx = 0; answered = false;
  updateStats(); renderQuestion();
}

// ========== RENDER QUESTION ==========
function renderQuestion() {
  const area = document.getElementById('contentArea');
  removeKeyHandler();

  if (queue.length === 0) {
    const msg = mode==='errors' ? 'Нет ошибок! 🎉' : 'Нет вопросов';
    const sub = mode==='errors' ? 'Все ответы правильные' : 'Выберите тему';
    area.innerHTML = '<div class="empty"><h2>'+msg+'</h2><p>'+sub+'</p></div>';
    return;
  }
  if (qIdx >= queue.length) {
    const pct = Math.round((stats.c/queue.length)*100);
    area.innerHTML = '<div class="result-card"><h2>Раунд завершён! 🎉</h2><div class="result-score">'+stats.c+'/'+queue.length+'</div><p>Правильно: '+pct+'%  ·  Ошибки: '+stats.w+'  ·  Пропущено: '+stats.s+'</p><button class="restart-btn" id="restartBtn">Начать заново</button></div>';
    document.getElementById('restartBtn').addEventListener('click', updateQueue);
    return;
  }

  const q = queue[qIdx];
  const opts = shuffle([q.correct, ...(q.wrong || [])]);
  const correctIdx = opts.indexOf(q.correct);
  const topicLabel = SUBJECTS[currentSubject].topics[q._key].name;

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = '<div class="q-meta">'+topicLabel+' · '+( qIdx+1)+'/'+queue.length+'</div><div class="q-text">'+escHtml(q.q)+'</div><div class="options" id="optsDiv"></div><div class="learn-answer" id="learnAnswer">✓ '+escHtml(q.correct)+'</div><div class="feedback" id="feedbackDiv"></div>';

  const optsDiv = card.querySelector('#optsDiv');
  opts.forEach((opt,i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = opt;
    btn.addEventListener('click', () => handleAnswer(i, correctIdx, q));
    optsDiv.appendChild(btn);
  });

  if (mode === 'learn') {
    const sb = document.createElement('button');
    sb.className = 'show-btn'; sb.textContent = 'Показать ответ';
    sb.addEventListener('click', () => revealAnswer(card, correctIdx, q));
    card.appendChild(sb);
  }

  area.innerHTML = '';
  area.appendChild(card);
  updateStats();
  installKeyHandler(opts, correctIdx, q);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function installKeyHandler(opts, correctIdx, q) {
  _keyHandler = (e) => {
    if (answered) {
      if (e.key==='Enter' || e.key==='ArrowRight') nextQuestion();
      return;
    }
    const n = parseInt(e.key);
    if (n >= 1 && n <= opts.length) handleAnswer(n-1, correctIdx, q);
  };
  document.addEventListener('keydown', _keyHandler);
}
function removeKeyHandler() {
  if (_keyHandler) { document.removeEventListener('keydown', _keyHandler); _keyHandler = null; }
}

function handleAnswer(idx, correctIdx, q) {
  if (answered) return;
  answered = true;
  document.querySelectorAll('.opt').forEach((btn,i) => {
    btn.disabled = true;
    if (i === correctIdx) btn.classList.add('correct');
    else if (i === idx) btn.classList.add('wrong');
  });
  const fb = document.getElementById('feedbackDiv');
  const isOk = idx === correctIdx;
  if (mode !== 'learn') {
    if (isOk) {
      stats.c++;
      fb.textContent = '✓ Верно!'; fb.className = 'feedback show ok';
      localStorage.setItem(lsKey(currentSubject,q._key,q._idx,'c'), '1');
      localStorage.removeItem(lsKey(currentSubject,q._key,q._idx,'w'));
    } else {
      stats.w++;
      fb.textContent = '✗ Ошибка. Верно: '+q.correct; fb.className = 'feedback show err';
      localStorage.setItem(lsKey(currentSubject,q._key,q._idx,'w'), '1');
    }
  }
  const nb = document.createElement('button');
  nb.className = 'next-btn';
  nb.textContent = qIdx+1 < queue.length ? 'Далее →' : 'Завершить';
  nb.addEventListener('click', nextQuestion);
  document.querySelector('.card').appendChild(nb);
  updateStats(); updateErrBadge();
}

function revealAnswer(card, correctIdx, q) {
  card.querySelector('#learnAnswer').classList.add('show');
  card.querySelectorAll('.opt').forEach((btn,i) => { btn.disabled=true; if(i===correctIdx) btn.classList.add('reveal'); });
  card.querySelector('.show-btn') && card.querySelector('.show-btn').remove();
  const nb = document.createElement('button');
  nb.className = 'next-btn'; nb.textContent = 'Следующий →';
  nb.addEventListener('click', () => { stats.s++; nextQuestion(); });
  card.appendChild(nb);
  answered = true; updateStats();
}

function nextQuestion() {
  removeKeyHandler();
  qIdx++; answered = false;
  renderQuestion();
  document.getElementById('contentWrap').scrollTop = 0;
}

// ========== BROWSE ==========
function renderBrowse(all) {
  const area = document.getElementById('contentArea');
  if (!all.length) { area.innerHTML='<div class="empty"><h2>Нет вопросов</h2></div>'; return; }
  const subj = SUBJECTS[currentSubject];
  let html = '';
  all.forEach(q => {
    html += '<div class="browse-item"><div class="browse-num">'+subj.topics[q._key].name+' · №'+(q._idx+1)+'</div><div class="browse-q">'+escHtml(q.q)+'</div><div class="browse-a">✓ '+escHtml(q.correct)+'</div></div>';
  });
  area.innerHTML = html;
}

// ========== STATS ==========
function updateStats() {
  document.getElementById('stC').textContent = stats.c;
  document.getElementById('stW').textContent = stats.w;
  document.getElementById('stS').textContent = stats.s;
  document.getElementById('stT').textContent = stats.c+stats.w;
  const total = queue.length || 1;
  const pct = Math.round((qIdx/total)*100);
  document.getElementById('progressText').textContent = 'Вопрос '+(Math.min(qIdx+1,total))+' из '+total;
  document.getElementById('progressPercent').textContent = pct+'%';
  document.getElementById('progressFill').style.width = pct+'%';
}

// ========== START ==========
renderHome();
</script>
